name: freshharvest
description: FreshHarvest - Fresh farm products delivered to your doorstep in Mbarara, Uganda
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  
  # State Management
  provider: ^6.1.2
  
  # Utilities
  intl: ^0.19.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Additional useful packages (uncomment if needed)
  # image_picker: ^1.1.2
  # cached_network_image: ^3.4.1
  # google_fonts: ^6.2.1
  # flutter_rating_bar: ^4.0.1
  # shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    # Add more asset folders if needed
    # - assets/icons/
    # - assets/animations/
  
